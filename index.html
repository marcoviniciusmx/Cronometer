<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title> Stopwatch</title>
</head>

<body>

    <section class="wrapper">

        <div class="main">

            <section class="text-main">
                <h1> Stopwatch</h1>
            </section>

            <section class="stopwatch">

                <div class="hours">

                    <h2 class="hour-counter"> 00</h2>
                    <p class="hour-text"> Hour</p>

                </div>
                
                <span>:</span>

                <div class="minutes">

                    <h2 class="minutes-counter"> 00</h2>
                    <p class="minutes-text"> Minutes</p>

                </div>

                <span>:</span>

                <div class="secounds">

                    <h2 class="secounds-counter"> 00</h2>
                    <p class="secounds-text"> Secounds</p>

                </div>

                <span>:</span>

                <div class="millisecounds">

                    <h2 class="millisecounds-counter"> 00</h2>
                    <p class="millisecounds-text"> Millisecounds</p>

                </div>

            </section>

            <section class="buttons">
                <button class="to-start" type="button"> To Start</button>
                <button class="to-stop" type="button"> To Stop</button>
                <button class="restart" type="button"> Restart</button>
            </section>
        </div>

    </section>

</body>

</html>
